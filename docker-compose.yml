# Local dev infrastructure for JFE TraceLine: Microsoft SQL Server + Redis.
# Start with:  docker compose up -d   (or  npm run infra:up)
# Stop with:   docker compose down     (or  npm run infra:down)
#
# Defaults here line up with .env.example, so the app connects out of the box.
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: jfe-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      # Must match DB_PASSWORD in .env (SQL Server enforces password complexity).
      MSSQL_SA_PASSWORD: "Jfe_TraceLine#2026"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jfe-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mssql-data:
  redis-data:
