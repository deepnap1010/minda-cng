# One-command dev environment for the JP Minda platform.
#
#   docker compose up --build
#
# Brings up, on one network:
#   - mssql      SQL Server 2025 (REQUIRED: the app uses the native JSON column type)
#   - mssql-init creates the JPMDO database once, then exits
#   - redis      cache / sessions
#   - backend    Express API on http://localhost:9021  (auto-creates tables in dev)
#   - frontend   Vite dev server on http://localhost:5180
#
# MongoDB (raw CNG telemetry) is OPTIONAL and off by default — set MONGODB_URI in
# mindaback/.env.docker to enable it. Everything else runs without it.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: minda-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Minda@Dev2026"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: minda-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build: ./mindaback
    container_name: minda-backend
    env_file:
      - ./mindaback/.env.docker
    depends_on:
      mssql:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "9021:9021"
    volumes:
      - ./mindaback:/app
      - /app/node_modules
    # Wait for SQL Server, create the JPMDO database if missing, then start dev.
    command: sh -c "node scripts/docker-init-db.js && npm run dev"
    restart: unless-stopped

  frontend:
    build: ./CheckList-Frontend
    container_name: minda-frontend
    environment:
      # Vite dev-proxy target = the backend CONTAINER. Inside this container
      # "localhost" would mean the frontend itself, so we use the service name.
      - VITE_BACKEND_URL=http://backend:9021/api/v1
    depends_on:
      - backend
    ports:
      - "5180:5180"
    volumes:
      - ./CheckList-Frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

volumes:
  mssql-data:
  redis-data:
